<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login — Dashboard E-Resources Perpustakaan PKN STAN">
  <title>Login — Dashboard E-Resources PKN STAN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Custom premium styling specifically for the login page */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 20px;
      background: radial-gradient(circle at center, #f8fafc 0%, #cbd5e1 100%);
      position: relative;
      overflow: hidden;
    }

    /* Abstract shapes in background */
    .bg-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      height: 40%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 45%;
      height: 45%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(24px);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08), 0 0 30px rgba(99, 102, 241, 0.03);
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, transparent 40%, transparent 60%, rgba(139, 92, 246, 0.3) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-lg);
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-logo p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 18px;
      height: 18px;
      pointer-events: none;
      transition: color var(--transition-fast);
    }

    .login-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 12px 16px 12px 42px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all var(--transition-fast);
    }

    .login-input:focus {
      border-color: var(--accent-indigo);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.1);
    }

    .login-input:focus + svg {
      color: var(--accent-indigo);
    }

    .login-btn {
      width: 100%;
      padding: 12px 24px;
      background: var(--gradient-primary);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-top: 10px;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      background: rgba(225, 29, 72, 0.08);
      border: 1px solid rgba(225, 29, 72, 0.15);
      border-radius: var(--radius-md);
      padding: 12px;
      font-size: 13px;
      color: var(--accent-rose);
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📊</div>
        <h1>Dashboard E-Resources</h1>
        <p>Perpustakaan Politeknik Keuangan Negara STAN</p>
      </div>

      <div class="login-error" id="login-error">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-message">Username atau password salah!</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="login-input" placeholder="Masukkan username" required autocomplete="username">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 28px;">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="login-input" placeholder="Masukkan password" required autocomplete="current-password">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="login-btn">Masuk</button>
      </form>
    </div>
  </div>

  <script>
    // SHA-256 password hash for "LibDashPKN26#"
    const TARGET_USERNAME = 'pknstanlib';
    const TARGET_PASSWORD_HASH = '2ba6b2ed458a394ff2aeb9764c1e2c328b69480a399f552fbb6434a88ce83601';

    // Fast SHA-256 helper
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      const errorDiv = document.getElementById('login-error');
      const errorMsg = document.getElementById('error-message');

      errorDiv.style.display = 'none';

      if (usernameInput !== TARGET_USERNAME) {
        errorMsg.textContent = 'Username atau password salah!';
        errorDiv.style.display = 'flex';
        return;
      }

      try {
        const hashedInput = await sha256(passwordInput);
        if (hashedInput === TARGET_PASSWORD_HASH) {
          // Store token in sessionStorage
          sessionStorage.setItem('dashboard_auth_token', 'session_pknstanlib_authenticated');
          
          // Redirect to index page
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = 'Username atau password salah!';
          errorDiv.style.display = 'flex';
        }
      } catch (err) {
        console.error('Crypto error:', err);
        errorMsg.textContent = 'Terjadi kesalahan sistem, silakan coba lagi.';
        errorDiv.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
